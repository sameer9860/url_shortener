{% extends 'base.html' %}

{% block title %}Link Expired{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 text-center">
    <div class="card shadow-sm">
      <div class="card-body py-5">
        <i class="bi bi-hourglass-bottom display-2 text-warning"></i>
        <h3 class="fw-bold mt-3">This link has expired</h3>
        <p class="text-muted">
          The short URL <strong>/{{ short_url.short_key }}</strong> is no longer active.
        </p>
        <a href="{% url 'shortener:create_url' %}" class="btn btn-primary mt-2">
          <i class="bi bi-plus-circle me-1"></i>Create a New URL
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
