{% extends 'base.html' %}

{% block title %}Delete URL{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="card shadow-sm border-danger">
      <div class="card-body p-4 text-center">

        <i class="bi bi-trash display-4 text-danger"></i>
        <h4 class="fw-bold mt-3">Delete Short URL?</h4>
        <p class="text-muted">
          You are about to delete <strong>/{{ short_url.short_key }}</strong>.
          This action cannot be undone.
        </p>
        <div class="alert alert-light text-start text-truncate small">
          <i class="bi bi-link-45deg me-1"></i>{{ short_url.original_url }}
        </div>

        <form method="POST" class="d-flex gap-2 justify-content-center mt-3">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger px-4">
            <i class="bi bi-trash me-1"></i>Yes, Delete
          </button>
          <a href="{% url 'shortener:dashboard' %}" class="btn btn-outline-secondary px-4">
            Cancel
          </a>
        </form>

      </div>
    </div>
  </div>
</div>
{% endblock %}
